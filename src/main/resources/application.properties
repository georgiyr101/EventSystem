spring.application.name=event-system
spring.datasource.url=jdbc:postgresql://localhost:5432/event_system
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT (dev defaults; override in real environments)
app.jwt.secret=dev-change-me-please-use-a-long-random-secret-key-32bytes-min
app.jwt.expiration-ms=86400000

# Optional bootstrap admin (created on startup if missing)
app.bootstrap.admin-email=
app.bootstrap.admin-password=
app.bootstrap.admin-full-name=Administrator