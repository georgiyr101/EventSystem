spring.application.name=event-system
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/event_system}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# JWT (dev defaults; override in real environments)
app.jwt.secret=${APP_JWT_SECRET:dev-change-me-please-use-a-long-random-secret-key-32bytes-min}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# Optional bootstrap admin (created on startup if missing)
app.bootstrap.admin-email=${APP_BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin-password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.admin-full-name=${APP_BOOTSTRAP_ADMIN_FULL_NAME:Administrator}
