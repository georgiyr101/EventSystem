name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "22"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci --ignore-scripts
          npm run build

      - name: Copy frontend into classpath static
        run: |
          rm -rf src/main/resources/static
          mkdir -p src/main/resources/static
          cp -r frontend/dist/. src/main/resources/static/

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build backend
        run: ./mvnw -B -DskipTests clean package

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pull-requests: read
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci --ignore-scripts
          npm run build

      - name: Copy frontend into classpath static
        run: |
          rm -rf src/main/resources/static
          mkdir -p src/main/resources/static
          cp -r frontend/dist/. src/main/resources/static/

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Test
        run: ./mvnw -B verify

      - name: SonarCloud analyze
        if: ${{ env.SONAR_TOKEN != '' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          ./mvnw -B -DskipTests
          org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar
          -Dsonar.token=${SONAR_TOKEN}
          -Dsonar.projectKey=georgiyr101_EventSystem
          -Dsonar.qualitygate.wait=false

  docker-image:
    name: Docker build and push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: docker-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is not set" >&2
            exit 1
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

  healthcheck:
    name: Healthcheck
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Wait for startup
        run: sleep 60

      - name: Check /actuator/health with retries
        env:
          APP_BASE_URL: ${{ secrets.RENDER_APP_URL }}
        run: |
          if [ -z "$APP_BASE_URL" ]; then
            echo "RENDER_APP_URL secret is not set" >&2
            exit 1
          fi

          BASE="${APP_BASE_URL%/}"
          for i in {1..45}; do
            RESPONSE=$(curl -fsS "${BASE}/actuator/health" || true)
            if echo "$RESPONSE" | grep -q '"status":"UP"'; then
              echo "Healthcheck passed"
              exit 0
            fi
            echo "Healthcheck attempt $i failed, retrying in 20s..."
            sleep 20
          done
          echo "Service is not healthy after retries" >&2
          exit 1
