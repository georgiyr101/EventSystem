name: CI/CD

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-build-and-test:
    name: Backend Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Build and test backend
        run: ./mvnw -B clean verify

      - name: Build backend Docker image
        run: docker build -t event-system-backend .

      - name: SonarCloud analyze
        if: ${{ env.SONAR_TOKEN != '' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          ./mvnw -B -DskipTests
          org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar
          -Dsonar.token=${SONAR_TOKEN}
          -Dsonar.projectKey=georgiyr101_EventSystem
          -Dsonar.qualitygate.wait=true

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts

      - name: Build frontend
        run: npm run build

      - name: Build frontend Docker image
        run: docker build -t event-system-frontend .

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - backend-build-and-test
      - frontend-build
    timeout-minutes: 20
    permissions:
      contents: read
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK_URL}" ]; then
            echo "Missing GitHub secret: RENDER_DEPLOY_HOOK_URL" >&2
            exit 1
          fi
          curl -fsS -X POST "${RENDER_DEPLOY_HOOK_URL}"

  healthcheck:
    name: Healthcheck
    runs-on: ubuntu-latest
    needs:
      - deploy
    timeout-minutes: 15
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    env:
      RENDER_HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
      FRONTEND_HEALTHCHECK_URL: ${{ vars.FRONTEND_HEALTHCHECK_URL }}
    steps:
      - name: Wait for Render and verify backend health
        run: |
          if [ -z "${RENDER_HEALTHCHECK_URL}" ]; then
            echo "Missing GitHub secret: RENDER_HEALTHCHECK_URL" >&2
            exit 1
          fi

          HEALTH_URL="${RENDER_HEALTHCHECK_URL%/}"
          if [[ "${HEALTH_URL}" != */actuator/health ]]; then
            HEALTH_URL="${HEALTH_URL}/actuator/health"
          fi

          echo "Healthcheck URL: ${HEALTH_URL}"
          for attempt in $(seq 1 60); do
            status_code=$(curl -sS -L --connect-timeout 5 --max-time 20 -o /tmp/health.txt -w "%{http_code}" "${HEALTH_URL}" || true)
            if [ "${status_code}" = "200" ]; then
              echo "Healthcheck passed"
              cat /tmp/health.txt || true
              exit 0
            fi
            echo "Attempt ${attempt}/60: ${status_code:-no response}"
            sleep 10
          done
          echo "Healthcheck did not succeed in time" >&2
          cat /tmp/health.txt || true
          exit 1

      - name: Wait for frontend healthcheck
        if: ${{ env.FRONTEND_HEALTHCHECK_URL != '' }}
        run: |
          : > /tmp/frontend-health.txt
          for attempt in $(seq 1 60); do
            status_code=$(curl -sS -L --connect-timeout 5 --max-time 20 -o /tmp/frontend-health.txt -w "%{http_code}" "${FRONTEND_HEALTHCHECK_URL}" || true)
            if [ "${status_code}" = "200" ]; then
              echo "Frontend healthcheck passed"
              cat /tmp/frontend-health.txt || true
              exit 0
            fi
            echo "Frontend attempt ${attempt}/60: ${status_code:-no response}"
            sleep 10
          done
          echo "Frontend healthcheck did not become healthy in time" >&2
          cat /tmp/frontend-health.txt || true
          exit 1
