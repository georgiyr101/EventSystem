services:
  db:
    image: postgres:16-alpine
    container_name: event-system-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-event_system}
      POSTGRES_USER: ${DB_USERNAME?DB_USERNAME must be set in .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD?DB_PASSWORD must be set in .env}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME?DB_USERNAME must be set in .env} -d ${DB_NAME:-event_system}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event-system-app
    restart: unless-stopped
    environment:
      PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-event_system}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME?DB_USERNAME must be set in .env}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD?DB_PASSWORD must be set in .env}
      APP_JWT_SECRET: ${APP_JWT_SECRET?APP_JWT_SECRET must be set in .env}
      APP_BOOTSTRAP_ADMIN_EMAIL: ${APP_BOOTSTRAP_ADMIN_EMAIL:-}
      APP_BOOTSTRAP_ADMIN_PASSWORD: ${APP_BOOTSTRAP_ADMIN_PASSWORD:-}
      APP_BOOTSTRAP_ADMIN_FULL_NAME: ${APP_BOOTSTRAP_ADMIN_FULL_NAME:-Administrator}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  postgres_data:
